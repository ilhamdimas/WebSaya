<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EduPay — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body id="body">

<div class="ledger-bar">
  <div class="wrap">
    <div class="brand">EduPay <small>Buku Bayar</small></div>
    <button class="btn-toggle" onclick="darkMode()">Mode Malam</button>
  </div>
</div>

<div class="wrap page">

  <div class="card greeting-card">
    <p class="hello">Halo, Ilham 👋</p>
    <div class="balance-row">
      <div>
        <div class="balance-amount">Rp 750.000</div>
        <div class="balance-label">Total Tagihan Berjalan</div>
      </div>
      <span class="due-chip">Jatuh tempo 5 hari</span>
    </div>
  </div>

  <div class="entry-grid">
    <a href="qris.html" class="card entry">
      <span class="ico">💳</span>
      <span class="lbl">Bayar</span>
    </a>
    <a class="card entry">
      <span class="ico">📋</span>
      <span class="lbl">Riwayat</span>
    </a>
    <a class="card entry">
      <span class="ico">👤</span>
      <span class="lbl">Profil</span>
    </a>
  </div>

  <div class="card section-card">
    <h4 class="section-title">Grafik Pembayaran</h4>
    <p class="section-sub">5 bulan terakhir</p>
    <div class="chart-wrap">
      <canvas id="myChart" height="160"></canvas>
    </div>
  </div>

  <div class="cta-center">
    <a href="qris.html" class="btn btn-stamp" style="width:auto;display:inline-flex;">Bayar via QRIS</a>
  </div>

</div>

<script>
const ctx = document.getElementById('myChart');

function chartColors(){
  const dark = document.body.classList.contains('dark');
  return {
    bar: dark ? '#C8A24A' : '#1C3144',
    grid: dark ? 'rgba(237,230,214,.08)' : 'rgba(28,49,68,.08)',
    text: dark ? '#B9C2CC' : '#4A5A6B'
  };
}

let chartInstance;
function renderChart(){
  const c = chartColors();
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Jan','Feb','Mar','Apr','Mei'],
      datasets: [{
        label: 'Pembayaran (Rp ribu)',
        data: [200,350,500,450,750],
        backgroundColor: c.bar,
        borderRadius: 3,
        maxBarThickness: 36
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: c.text, font: { family: 'IBM Plex Mono', size: 11 } }, grid: { display: false } },
        y: { ticks: { color: c.text, font: { family: 'IBM Plex Mono', size: 11 } }, grid: { color: c.grid } }
      }
    }
  });
}
renderChart();

function darkMode(){
  document.body.classList.toggle('dark');
  renderChart();
}
</script>

</body>
</html>
